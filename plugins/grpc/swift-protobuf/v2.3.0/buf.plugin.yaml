version: v1
name: buf.build/grpc/swift-protobuf
plugin_version: v2.3.0
source_url: https://github.com/grpc/grpc-swift-protobuf
description: Generates Swift client and server stubs for the gRPC framework.
deps:
  - plugin: buf.build/apple/swift:v1.36.1
output_languages:
  - swift
registry:
  swift:
    deps:
      - source: https://github.com/grpc/grpc-swift-protobuf.git
        package: grpc-swift-protobuf
        version: 2.3.0
        products:
          - GRPCProtobuf
        platforms:
          macos: v15
          ios: v18
          tvos: v18
          watchos: v11
        swift_versions:
          - .v6
  opts:
    - Visibility=Public
    - FileNaming=PathToUnderscores
spdx_license_id: Apache-2.0
license_url: https://github.com/grpc/grpc-swift-protobuf/blob/2.3.0/LICENSE
integration_guide_url: https://swiftpackageindex.com/grpc/grpc-swift-protobuf/2.3.0/documentation/grpcprotobuf
