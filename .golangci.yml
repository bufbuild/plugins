    # Maven packages typically upload a variety of hashes (md5, sha1, sha256, sha512) for artifacts.
    # These weaker primitives are for older client versions without support for newer primitives.
    # See: https://maven.apache.org/resolver/about-checksums.html#checksum-changes
    - linters:
        - gosec
      # G401 checks for use of weak cryptographic primitive (in this case, md5 and sha1).
      path: internal/bufd/bufdmavenregistry/handler.go
      text: "G401:"
    - linters:
        - gosec
      # G501 checks for blocklisted import crypto/md5 for being a weak cryptographic primitive.
      path: internal/bufd/bufdmavenregistry/handler.go
      text: "G501:"
    - linters:
        - gosec
      # G505 checks for blocklisted import crypto/sha1 for being a weak cryptographic primitive.
      path: internal/bufd/bufdmavenregistry/handler.go
      text: "G505:"
    - linters:
