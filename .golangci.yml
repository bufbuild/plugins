        - stylecheck
      # this checks for no capitalization of errors
      text: "ST1005:"
    - linters:
        - gosec
      # G101 checks for hardcoded credentials, and the variables named "*Password*"
      # trip this off. We should check whether we can actually remove these
      # variables altogether now.
      path: internal/bufd/bufdpersist/bufdpersist.go
      text: "G101:"
    - linters:
        - gosec
      # G203 checks for HTML being escaped, and we pass JSON verbatim in an HTML template.
      # We marshal the JSON ourselves.
      path: internal/bufd/bufdweb/handler.go
      text: "G203:"
    - linters:
        - gosec
      # G203 checks for HTML being escaped, and we pass JSON verbatim in an HTML template.
      # We marshal the JSON ourselves.
      path: internal/bufd/bufdwebstudio/handler.go
      text: "G203:"
    - linters:
        - gosec
      # G101 checks for hardcoded credentials, and the variables named "*Token*"
      # trip this off.
      path: internal/pkg/github/cmd/github-releases-to-changelog/main.go
      text: "G101:"
    - linters:
        - gosec
      # G101 checks for hardcoded credentials, and the variables named "*Secret*"
      # trip this off.
      path: internal/bufd/bufdweb/bufdwebapp/bufdwebapp.go
