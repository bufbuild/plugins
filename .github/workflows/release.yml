name: Create Release

on:
  schedule:
    # At minute 30 past every 6th hour.
    - cron: "30 */6 * * *"
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Force-include plugins (comma-separated, e.g. "connect-go,grpc/csharp:v1.68.1", or "all")'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  issues: write
  packages: read

# Only allow a single release workflow to run at a time.
concurrency: ${{ github.workflow }}

jobs:
  release:
    environment: production
    if: github.repository == 'bufbuild/plugins'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history and tags needed to diff against the prior release tag
      - name: Login to GitHub Container Registry
        if: github.repository == 'bufbuild/plugins'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.MINISIGN_PRIVATE_KEY_PASSWORD }}
          PLUGINS: ${{ inputs.plugins }}
        run: |
          echo "${MINISIGN_PRIVATE_KEY}" > minisign.key
          go run ./internal/cmd/release --commit ${{ github.sha }} --minisign-private-key minisign.key .
      - name: Clean Up
        if: always()
        run: |
          rm -fv minisign.key
      - name: Generate Github Token
        id: generate_issues_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: ${{ failure() }}
        with:
          app-id: ${{ secrets.BUFBUILD_ISSUE_CREATOR_APP_ID }}
          private-key: ${{ secrets.BUFBUILD_ISSUE_CREATOR_APP_KEY }}
          permission-issues: write
      - uses: dblock/create-a-github-issue@a25e69ccb88998dc267170a0dbde8ef8ac3a491c # v3.4.0
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_issues_token.outputs.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          filename: .github/automatic-workflow-issue-template.md
          update_existing: true
          search_existing: open
  upload:
    needs: release
    uses: ./.github/workflows/upload.yml
